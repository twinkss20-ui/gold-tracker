<!DOCTYPE html>
<html>
<head>
  <title>Gold Price Tracker</title>
  <style>
    body { font-family: Arial; text-align: center; padding: 20px; }
    .box { border: 1px solid #ddd; padding: 20px; margin: 10px; border-radius: 10px; }
  </style>
</head>
<body>

<h1>Gold Price Tracker</h1>

<div class="box">
  <h2>Today's Gold Rate</h2>
  <p>24K: ₹<span id="rate24">72000</span></p>
  <p>22K: ₹<span id="rate22">66000</span></p>
</div>

<div class="box">
  <h2>Lowest Deal</h2>
  <p id="deal"></p>
</div>

<script>
async function getGoldPrice() {
  try {
    // 1. Get gold price (USD per ounce)
    const goldRes = await fetch("https://api.metals.live/v1/spot/gold");
    const goldData = await goldRes.json();
    let usdPerOunce = goldData[0].price;

    // 2. Get USD → INR rate
    const forexRes = await fetch("https://api.exchangerate-api.com/v4/latest/USD");
    const forexData = await forexRes.json();
    let usdToInr = forexData.rates.INR;

    // 3. Convert to INR per gram
    let inrPerOunce = usdPerOunce * usdToInr;
    let inrPerGram = inrPerOunce / 31.1;

    // 4. Convert to per 10g (India standard)
    let rate24 = Math.round(inrPerGram * 10);
    let rate22 = Math.round(rate24 * 0.92);

    // 5. Show on website
    document.getElementById("rate24").innerText = rate24;
    document.getElementById("rate22").innerText = rate22;

  } catch (err) {
    document.getElementById("rate24").innerText = "Error";
    document.getElementById("rate22").innerText = "Error";
  }
}

getGoldPrice();
</script>
</body>
</html>
